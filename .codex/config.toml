# Project-local Codex CLI defaults for Open Harness.
# Docker is the isolation boundary, so Codex runs without prompts or its own
# workspace sandbox. Keep permission-profile changes validated against `codex`;
# the old glob-based shape makes Codex 0.118+ abort at startup.

model = "gpt-5.5"
approval_policy = "never"
sandbox_mode = "danger-full-access"

model_reasoning_effort = "xhigh"

[features]
codex_hooks = true
