# Project-local Codex CLI defaults for Open Harness.
# Docker is the isolation boundary, so Codex runs without prompts or its own
# workspace sandbox. Keep permission-profile changes validated against `codex`;
# the old glob-based shape makes Codex 0.118+ abort at startup.

model = "gpt-5.5"
approval_policy = "never"
sandbox_mode = "danger-full-access"

model_reasoning_effort = "medium"

[features]
hooks = true

[tui]
status_line = [
  "model-with-reasoning",
  "run-state",
  "context-used",
  "context-window-size",
  "git-branch",
  "current-dir",
]
status_line_use_colors = true

# DebugMCP — project-level MCP server (see docs/integrations/debugmcp.md).
# Streamable HTTP endpoint the ozzafar.debugmcpextension VS Code extension
# exposes while a VS Code window is attached to this container (:3001).
[mcp_servers.debugmcp]
url = "http://localhost:3001/mcp"
