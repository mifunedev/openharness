# DeepAgents Host State Mount Overlay
# =====================================
# Purpose: Bind-mount the host's ~/.deepagents directory into the sandbox,
# so the sandboxed `deepagents` CLI inherits host provider keys, model
# config, memory, skills, and sessions. Trusted local users running
# multiple sandboxes can reuse a single source of DeepAgents state instead
# of re-pasting provider keys into each sandbox's named volume.
#
# One mount, one concern:
#   - ~/.deepagents/ (dir) — .env (provider keys), config.toml (model/CLI
#                            defaults), memory, skills, sessions
#
# Pre-flight:
#   $HOST_DEEPAGENTS_DIR (default ~/.deepagents) must exist as a directory
#   on the host. If the target is missing, Docker auto-creates it as a
#   directory owned by root — `deepagents` then fails to read/write its
#   provider env file. `scripts/install.sh` pre-creates `~/.deepagents`
#   alongside `~/.claude`, `~/.codex`, and `~/.pi` so this is satisfied
#   by default for installer-driven setups.
#
# Requirements: Host UID MUST equal the sandbox UID (1000). Provider key
# files under `~/.deepagents/.env` are typically mode 0600 (owner-only),
# so the group-membership trick used elsewhere in entrypoint.sh does NOT
# grant access. If host UID ≠ 1000, `deepagents` will fail to read the
# provider env file despite the bind-mount succeeding;
# `scripts/install.sh` strips this overlay from `composeOverrides` when
# the host UID is not 1000 so non-UID-1000 hosts fall back to the
# `deepagents-auth` named volume cleanly.
#
# Security tradeoff: this mounts provider API keys, agent memory, and
# session history into a container that may execute untrusted agent code
# AND has the host Docker socket bind-mounted by default. With
# `--shell-allow-list all` (operator opt-in via `RALPH_DEEPAGENTS_FLAGS`),
# DeepAgents could shell out and reach sibling containers or the host
# Docker daemon. Enable the host overlay only for trusted workflows.
# Provider keys are NOT OAuth tokens — they typically have no expiry and
# no per-request scope, so a leak from this overlay has a wider blast
# radius than `claude-host` or `codex-host`. The overlay is opt-in: it is
# NOT listed in the default `.openharness/config.json` `composeOverrides`.
#
# Bleed-through: ~/.deepagents/sessions/, memory, and skills from other
# host work will be visible inside the sandbox. Acknowledged cost of
# full-mount convenience.
#
# Permissions: Read-write (sandbox writes host sessions/memory live).
# Replaces: deepagents-auth named volume from base docker-compose.yml at
# the /home/sandbox/.deepagents target path. The named volume declaration
# stays in the base compose — it becomes orphaned (unmounted) while this
# overlay is active and is reinstated when the overlay is removed. To
# return to the named volume, remove this overlay from
# `.openharness/config.json` `composeOverrides` and rerun `make sandbox`
# (or `make destroy && make sandbox` if the container is already up).
# Resetting the `deepagents-auth` named volume only (without touching
# host `~/.deepagents`) is `docker volume rm <project>_deepagents-auth`.
#
# Entrypoint coordination: sets DEEPAGENTS_HOST_BIND_MOUNT=1 so
# entrypoint.sh skips its recursive chown on /home/sandbox/.deepagents
# (which would otherwise rewrite host file ownership).
#
# Usage: enable via .openharness/config.json composeOverrides[]:
#   ".devcontainer/docker-compose.deepagents-host.yml"

services:
  sandbox:
    volumes:
      - ${HOST_DEEPAGENTS_DIR:-~/.deepagents}:/home/sandbox/.deepagents
    environment:
      - DEEPAGENTS_HOST_BIND_MOUNT=1
