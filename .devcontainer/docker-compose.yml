# Main Sandbox Docker Compose Configuration
# ===========================================
# Base sandbox compose. The base ships with zero in-tree overlays;
# agent auth and tool state persist in named volumes managed by Docker
# (claude-auth, codex-auth, pi-auth, opencode-auth, grok-auth,
# deepagents-auth, herdr-data, cloudflared-auth, config-dir), and the bind-mounted
# repo's UID is synced into the sandbox user by entrypoint.sh on first boot.
# config-dir persists all XDG config, including GitHub and Herdr settings.
# Grok Build uses ~/.grok for user state/auth, persisted by grok-auth.
# Hermes uses the project-local bind-mounted `.hermes/` directory as
# HERMES_HOME for all runtime state, including auth.json (gitignored).
#
# Downstream harness packs and Pi extensions can register additional
# overlays by appending paths to composeOverrides[] in config.json;
# `make sandbox` and `.oh/scripts/install.sh` pick those up via jq.
#
# The host Docker socket is NOT mounted here by default (socket access is
# effectively host root). It is an opt-in overlay — docker-compose.docker-sock.yml
# — applied by .oh/scripts/docker-compose.sh only when DOCKER_SOCKET is truthy
# (harness.yaml `sandbox.docker_socket` or .devcontainer/.env). The VS Code
# "Reopen in Container" path reads THIS file directly and bypasses that wrapper,
# so it never gets the socket; add the overlay to devcontainer.json to enable it
# there. See .oh/docs/security-considerations.md.

name: ${SANDBOX_NAME:-openharness}

services:
  sandbox:
    # Default is a LOCAL build tagged sandbox-<name>. Set OH_SANDBOX_IMAGE
    # (harness.yaml `sandbox.image`, e.g. ghcr.io/mifunedev/openharness:latest)
    # to run the prebuilt image instead — the CLI path pairs this with
    # `up -d --no-build` (`oh sandbox --image`); the VS Code "Reopen in
    # Container" path relies on pull_policy since it can't pass --no-build.
    image: ${OH_SANDBOX_IMAGE:-sandbox-${SANDBOX_NAME:-openharness}}
    pull_policy: ${OH_PULL_POLICY:-missing}
    container_name: ${SANDBOX_NAME:-openharness}
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
      args:
        OH_PROJECT_ROOT: ${OH_PROJECT_ROOT:-/home/sandbox/harness}
        INSTALL_OPENCODE: ${INSTALL_OPENCODE:-false}
        INSTALL_GROK_BUILD: ${INSTALL_GROK_BUILD:-false}
        INSTALL_DEEPAGENTS: ${INSTALL_DEEPAGENTS:-false}
        INSTALL_HERMES: ${INSTALL_HERMES:-false}
    volumes:
      - ..:${OH_PROJECT_ROOT:-/home/sandbox/harness}
      - claude-auth:/home/sandbox/.claude
      - codex-auth:/home/sandbox/.codex
      - pi-auth:/home/sandbox/.pi
      - opencode-auth:/home/sandbox/.local/share/opencode
      - grok-auth:/home/sandbox/.grok
      - deepagents-auth:/home/sandbox/.deepagents
      - herdr-data:/home/sandbox/.herdr
      - cloudflared-auth:/home/sandbox/.cloudflared
      - config-dir:/home/sandbox/.config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - SANDBOX_NAME=${SANDBOX_NAME:-openharness}
      - SANDBOX_PASSWORD=${SANDBOX_PASSWORD:-test1234}
      - TZ=${TZ:-America/Los_Angeles}
      - CLAUDE_DANGEROUSLY_SKIP_PERMISSIONS=true
      - GIT_USER_NAME=${GIT_USER_NAME:-}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL:-}
      - GH_TOKEN=${GH_TOKEN:-}
      - XAI_API_KEY=${XAI_API_KEY:-}
      - INSTALL_AGENT_BROWSER=${INSTALL_AGENT_BROWSER:-false}
      - SKIP_PNPM_INSTALL=${SKIP_PNPM_INSTALL:-0}
      - INSTALL_HERMES=${INSTALL_HERMES:-false}
      - HERMES_HOME=${OH_PROJECT_ROOT:-/home/sandbox/harness}/.hermes
      - OH_PROJECT_ROOT=${OH_PROJECT_ROOT:-/home/sandbox/harness}
      - HERMES_DASHBOARD=${HERMES_DASHBOARD:-false}
      - HERMES_DASHBOARD_PORT=${HERMES_DASHBOARD_PORT:-9119}
      - CRONS_DIR=${CRONS_DIR:-.oh/crons}
      - CRON_AGENT_BIN=${CRON_AGENT_BIN:-claude}
      - MEMORY_DIR=${MEMORY_DIR:-.oh/memory}
      - WORKTREES_DIR=${WORKTREES_DIR:-.oh/worktrees}
    stdin_open: true
    tty: true
    init: true
    entrypoint: /usr/local/bin/entrypoint.sh
    command: sleep infinity
    healthcheck:
      test: ["CMD", "bash", "${OH_PROJECT_ROOT:-/home/sandbox/harness}/.oh/scripts/sandbox-healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s
    restart: unless-stopped

volumes:
  claude-auth:
  codex-auth:
  pi-auth:
  opencode-auth:
  grok-auth:
  deepagents-auth:
  herdr-data:
  cloudflared-auth:
  config-dir:
