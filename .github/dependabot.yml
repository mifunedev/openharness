# Dependabot configuration.
#
# Dependabot security updates are enabled at the repository level and run
# automatically. This file does NOT enable version-update PRs
# (open-pull-requests-limit: 0).
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
