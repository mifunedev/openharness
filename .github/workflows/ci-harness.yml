name: "CI: Harness"

on:
  workflow_dispatch:
  push:
    branches:
      - development
      - main
    paths:
      - "packages/**"
      - "scripts/**"
      - ".pi/**"
      - "Makefile"
      - "harness.yaml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "vitest.config.ts"
      - ".github/workflows/ci-harness.yml"
      - ".mifune/skills/**"
      - ".claude/hooks/**"
      - "crons/**"
      - "context/**"
      - ".devcontainer/**"
      - "install/**"
      - "workspace/**"
      - "evals/**"
  pull_request:
    paths:
      - "packages/**"
      - "scripts/**"
      - ".pi/**"
      - "Makefile"
      - "harness.yaml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "vitest.config.ts"
      - ".github/workflows/ci-harness.yml"
      - ".mifune/skills/**"
      - ".claude/hooks/**"
      - "crons/**"
      - "context/**"
      - ".devcontainer/**"
      - "install/**"
      - "workspace/**"
      - "evals/**"

concurrency:
  group: ci-harness-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: "Lint, Typecheck, Build & Test"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22.x
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store/v3
          key: pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-

      - name: Run pnpm security audit
        run: pnpm run security:audit

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter './packages/**' -r --if-present run lint

      - name: Format check
        run: pnpm --filter './packages/**' -r --if-present run format:check

      - name: Typecheck (workspace packages)
        run: pnpm --filter './packages/**' -r --if-present run typecheck

      - name: Typecheck (oh CLI — npm standalone)
        run: |
          npm --prefix packages/oh ci
          npm --prefix packages/oh run typecheck

      - name: Build
        run: pnpm --filter './packages/**' -r --if-present run build

      - name: Test
        run: pnpm --filter './packages/**' -r --if-present run test

      - name: Root tests (scripts + .pi extensions)
        run: pnpm test:scripts

  boot-lint:
    name: Boot Path Lint (shellcheck + hadolint)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Shellcheck boot scripts
        run: |
          command -v shellcheck >/dev/null 2>&1 || { sudo apt-get update && sudo apt-get install -y shellcheck; }
          shellcheck --version
          shellcheck -S warning .devcontainer/*.sh install/*.sh scripts/*.sh .claude/hooks/*.sh

      - name: Hadolint Dockerfile
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
        with:
          dockerfile: .devcontainer/Dockerfile
          config: .hadolint.yaml
          failure-threshold: warning

      - name: Check pnpm pin drift
        run: bash scripts/check-pnpm-pin.sh

  eval-probes:
    name: "Eval Probe Regression Gate"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run eval probe suite
        run: bash .mifune/skills/eval/run.sh
