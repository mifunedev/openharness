name: "CI: Harness"

on:
  workflow_dispatch:
  push:
    branches:
      - development
      - main
    paths:
      - "packages/**"
      - ".oh/**"
      - ".pi/**"
      - "Makefile"
      - "harness.yaml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "vitest.config.ts"
      - ".github/workflows/ci-harness.yml"
      - ".oh/skills/**"
      - ".claude/hooks/**"
      - ".claude/protected-paths.txt"
      - ".oh/hooks/**"
      - ".oh/crons/**"
      - ".oh/context/**"
      - ".devcontainer/**"
      - "workspace/**"
      - ".oh/evals/**"
  pull_request:
    paths:
      - "packages/**"
      - ".oh/**"
      - ".pi/**"
      - "Makefile"
      - "harness.yaml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "vitest.config.ts"
      - ".github/workflows/ci-harness.yml"
      - ".oh/skills/**"
      - ".claude/hooks/**"
      - ".claude/protected-paths.txt"
      - ".oh/hooks/**"
      - ".oh/crons/**"
      - ".oh/context/**"
      - ".devcontainer/**"
      - "workspace/**"
      - ".oh/evals/**"

concurrency:
  group: ci-harness-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: "Lint, Typecheck, Build & Test"
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Ensure Mifune submodule
        run: bash .oh/scripts/link-providers.sh --init

      - name: Setup Node 22.x
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store/v3
          key: pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-

      - name: Run pnpm security audit
        run: pnpm run security:audit

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format:check

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build:harness

      - name: Test
        run: pnpm test:scripts

  boot-lint:
    name: Boot Path Lint (shellcheck + hadolint)
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Ensure Mifune submodule
        run: bash .oh/scripts/link-providers.sh --init

      - name: Shellcheck boot scripts
        run: |
          command -v shellcheck >/dev/null 2>&1 || { sudo apt-get update && sudo apt-get install -y shellcheck; }
          shellcheck --version
          shellcheck -S warning .oh/devcontainer/*.sh .oh/install/*.sh .oh/scripts/*.sh .claude/hooks/*.sh .claude/skills/autopilot/*.sh .claude/skills/prompt-miner/*.sh

      - name: Hadolint Dockerfile
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
        with:
          dockerfile: .oh/devcontainer/Dockerfile
          config: .hadolint.yaml
          failure-threshold: warning

      - name: Check pnpm pin drift
        run: bash .oh/scripts/check-pnpm-pin.sh

  eval-probes:
    name: "Eval Probe Regression Gate"
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Link provider skills
        run: bash .oh/scripts/link-providers.sh --init

      # Provision Node explicitly so the suite is runner-agnostic: GitHub-hosted
      # ships Node preinstalled, the self-hosted runner does not.
      - name: Setup Node 22.x
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run eval probe suite
        run: bash .oh/skills/eval/run.sh
