name: "CI: Harness"

on:
  workflow_dispatch:
  push:
    branches:
      - development
      - main
    paths:
      - "packages/**"
      - "scripts/**"
      - ".pi/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "vitest.config.ts"
      - ".github/workflows/ci-harness.yml"
      - ".claude/skills/**"
      - "crons/**"
      - "context/**"
  pull_request:
    paths:
      - "packages/**"
      - "scripts/**"
      - ".pi/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "vitest.config.ts"
      - ".github/workflows/ci-harness.yml"
      - ".claude/skills/**"
      - "crons/**"
      - "context/**"

concurrency:
  group: ci-harness-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: Lint, Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22.x
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store/v3
          key: pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter './packages/**' -r --if-present run lint

      - name: Format check
        run: pnpm --filter './packages/**' -r --if-present run format:check

      - name: Build
        run: pnpm --filter './packages/**' -r --if-present run build

      - name: Test
        run: pnpm --filter './packages/**' -r --if-present run test

      - name: Root tests (scripts + .pi extensions)
        run: pnpm test:scripts
