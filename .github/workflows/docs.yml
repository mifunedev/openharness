name: "Docs: build & deploy"

on:
  pull_request:
    paths:
      - ".oh/docs/**"
      - "docs/**"
      - "blog/**"
      - ".github/workflows/docs.yml"
  push:
    branches:
      - main
    paths:
      - ".oh/docs/**"
      - "docs/**"
      - "blog/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build docs
    # Route to the self-hosted runner when configured (vars.CI_RUNNER), falling
    # back to GitHub-hosted ubuntu-latest otherwise — same pattern as ci-harness,
    # conciseness, and sandbox-boot-guard. GitHub-hosted minutes are billing-gated
    # on this account, so ubuntu-latest-pinned jobs fail to start ("recent account
    # payments have failed"); the self-hosted runner sidesteps that.
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    concurrency:
      group: docs-build-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 22.x
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        working-directory: .oh/docs
        run: pnpm run build

      # Pages deploy only runs on the canonical repo. Forks build-validate docs
      # (the build job above) but skip deploy — they have no Pages site enabled,
      # and configure-pages would fail with "Resource not accessible by integration".
      - name: Configure Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.repository == 'mifunedev/openharness'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.repository == 'mifunedev/openharness'
        uses: actions/upload-pages-artifact@v3
        with:
          path: .oh/docs/build

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.repository == 'mifunedev/openharness'
    needs: build
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    concurrency:
      group: pages
      cancel-in-progress: false
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
