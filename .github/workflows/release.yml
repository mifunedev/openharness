name: Release

on:
  push:
    tags:
      - "[0-9][0-9][0-9][0-9].[0-9]*.[0-9]*"

jobs:
  validate:
    name: "Validate"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22.x
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store/v3
          key: pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-

      - name: Run pnpm security audit
        run: pnpm run security:audit

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter './packages/**' -r --if-present run lint

      - name: Format check
        run: pnpm --filter './packages/**' -r --if-present run format:check

      - name: Typecheck (workspace packages)
        run: pnpm --filter './packages/**' -r --if-present run typecheck

      - name: Typecheck (oh CLI — npm standalone)
        run: |
          npm --prefix packages/oh ci
          npm --prefix packages/oh run typecheck

      - name: Build
        run: pnpm run build:harness

      - name: Test
        run: pnpm --filter './packages/**' -r --if-present run test

      - name: Root tests (scripts + .pi extensions)
        run: pnpm test:scripts

      - name: Check pnpm pin drift
        run: bash scripts/check-pnpm-pin.sh

  boot-lint:
    name: Boot Path Lint (shellcheck + hadolint)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Shellcheck boot scripts
        run: |
          command -v shellcheck >/dev/null 2>&1 || { sudo apt-get update && sudo apt-get install -y shellcheck; }
          shellcheck --version
          shellcheck -S warning .devcontainer/*.sh install/*.sh scripts/*.sh

      - name: Hadolint Dockerfile
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
        with:
          dockerfile: .devcontainer/Dockerfile
          config: .hadolint.yaml
          failure-threshold: warning

  eval-probes:
    name: "Eval Probe Regression Gate"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run eval probe suite
        run: bash .claude/skills/eval/run.sh

  release:
    name: Build & Release
    runs-on: ubuntu-latest
    needs: [validate, boot-lint, eval-probes]
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse tag
        id: parse
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          VERSION="${{ steps.parse.outputs.version }}"
          NOTES_FILE="$RUNNER_TEMP/release-notes.md"
          awk -v ver="$VERSION" '
            $0 ~ ("^## \\[" ver "\\] - ") { in_block=1; next }
            in_block && /^## \[/ { exit }
            in_block && /^---[[:space:]]*$/ { exit }
            in_block { print }
          ' CHANGELOG.md > "$NOTES_FILE"
          if [ ! -s "$NOTES_FILE" ] || ! grep -q '[^[:space:]]' "$NOTES_FILE"; then
            echo "Release $VERSION — see CHANGELOG.md and commit history." > "$NOTES_FILE"
          fi
          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Setup Node 22.x
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          IMAGE=ghcr.io/mifunedev/openharness:${{ steps.parse.outputs.version }}
          LATEST=ghcr.io/mifunedev/openharness:latest

          docker build -f .devcontainer/Dockerfile -t $IMAGE -t $LATEST .
          docker push $IMAGE
          docker push $LATEST

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.parse.outputs.version }}
          body_path: ${{ steps.notes.outputs.notes_file }}
