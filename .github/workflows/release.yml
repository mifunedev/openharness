name: Release

on:
  push:
    tags:
      - "[0-9][0-9][0-9][0-9].[0-9]*.[0-9]*"

jobs:
  validate:
    name: "Validate"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Ensure Mifune submodule
        run: bash .oh/scripts/ensure-mifune.sh --init

      - name: Setup Node 22.x
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store/v3
          key: pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-

      - name: Run pnpm security audit
        run: pnpm run security:audit

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format:check

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build:harness

      - name: Test
        run: pnpm test:scripts

      - name: Check pnpm pin drift
        run: bash .oh/scripts/check-pnpm-pin.sh

  boot-lint:
    name: Boot Path Lint (shellcheck + hadolint)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Ensure Mifune submodule
        run: bash .oh/scripts/ensure-mifune.sh --init

      - name: Shellcheck boot scripts
        run: |
          command -v shellcheck >/dev/null 2>&1 || { sudo apt-get update && sudo apt-get install -y shellcheck; }
          shellcheck --version
          shellcheck -S warning .devcontainer/*.sh .oh/install/*.sh .oh/scripts/*.sh

      - name: Hadolint Dockerfile
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
        with:
          dockerfile: .devcontainer/Dockerfile
          config: .hadolint.yaml
          failure-threshold: warning

  eval-probes:
    name: "Eval Probe Regression Gate"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Ensure Mifune submodule
        run: bash .oh/scripts/ensure-mifune.sh --init

      - name: Run root Mifune checkout probe
        run: bash evals/probes/mifune-checkout.sh

      - name: Run eval probe suite
        run: bash .mifune/skills/eval/run.sh

  release:
    name: Build & Release
    runs-on: ubuntu-latest
    needs: [validate, boot-lint, eval-probes]
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Ensure Mifune submodule
        run: bash .oh/scripts/ensure-mifune.sh --init

      - name: Parse tag
        id: parse
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          VERSION="${{ steps.parse.outputs.version }}"
          NOTES_FILE="$RUNNER_TEMP/release-notes.md"
          awk -v ver="$VERSION" '
            $0 ~ ("^## \\[" ver "\\] - ") { in_block=1; next }
            in_block && /^## \[/ { exit }
            in_block && /^---[[:space:]]*$/ { exit }
            in_block { print }
          ' CHANGELOG.md > "$NOTES_FILE"
          if [ ! -s "$NOTES_FILE" ] || ! grep -q '[^[:space:]]' "$NOTES_FILE"; then
            echo "Release $VERSION — see CHANGELOG.md and commit history." > "$NOTES_FILE"
          fi
          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Setup Node 22.x
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        env:
          SANDBOX_NAME: openharness-release-smoke-${{ github.run_id }}
        run: |
          IMAGE=ghcr.io/mifunedev/openharness:${{ steps.parse.outputs.version }}
          LATEST=ghcr.io/mifunedev/openharness:latest
          SMOKE_IMAGE=sandbox-${SANDBOX_NAME}

          docker build -f .devcontainer/Dockerfile -t "$IMAGE" -t "$LATEST" -t "$SMOKE_IMAGE" .

      # Keep this pre-push smoke gate between build and push: it boots the
      # exact image object that will be published to GHCR, via the sandbox-* tag
      # consumed by .devcontainer/docker-compose.yml.
      - name: Smoke-test Docker image before publish
        env:
          SANDBOX_NAME: openharness-release-smoke-${{ github.run_id }}
          BOOT_SMOKE_TIMEOUT_SECONDS: "900"
          BOOT_SMOKE_INTERVAL_SECONDS: "10"
          BOOT_SMOKE_UP_ARGS: "up -d --no-build"
        run: bash .oh/scripts/sandbox-boot-smoke.sh

      - name: Push Docker image
        run: |
          IMAGE=ghcr.io/mifunedev/openharness:${{ steps.parse.outputs.version }}
          LATEST=ghcr.io/mifunedev/openharness:latest

          docker push "$IMAGE"
          docker push "$LATEST"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.parse.outputs.version }}
          body_path: ${{ steps.notes.outputs.notes_file }}
