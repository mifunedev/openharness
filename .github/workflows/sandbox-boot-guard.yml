name: "CI: Sandbox Boot Guard"

on:
  workflow_dispatch:
  push:
    branches:
      - development
      - main
    paths:
      - ".devcontainer/**"
      - ".oh/**"
      - "workspace/**"
      - "packages/oh/**"
      - ".oh/scripts/docker-compose.sh"
      - ".oh/scripts/sandbox-boot-smoke.sh"
      - ".oh/scripts/harness-config.sh"
      - "Makefile"
      - "harness.yaml.example"
      - ".dockerignore"
      - ".github/workflows/sandbox-boot-guard.yml"
  pull_request:
    paths:
      - ".devcontainer/**"
      - ".oh/**"
      - "workspace/**"
      - "packages/oh/**"
      - ".oh/scripts/docker-compose.sh"
      - ".oh/scripts/sandbox-boot-smoke.sh"
      - ".oh/scripts/harness-config.sh"
      - "Makefile"
      - "harness.yaml.example"
      - ".dockerignore"
      - ".github/workflows/sandbox-boot-guard.yml"

concurrency:
  group: sandbox-boot-guard-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sandbox-boot-guard:
    name: Validate sandbox compose and image build
    # When CI_RUNNER routes this to self-hosted it MUST be the dind model
    # (`make up-dind`): this job builds AND boots the devcontainer image, which
    # needs an isolated daemon + a non-root runner. The host-socket model can't.
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: recursive

      - name: Ensure Mifune submodule
        run: bash .oh/scripts/link-providers.sh --init

      - name: Docker diagnostics
        run: |
          docker --version
          docker compose version

      # Sandbox boot guard only: validate the local devcontainer substrate.
      # This job never logs in, pushes an image, or publishes release artifacts.
      - name: Validate base compose configuration
        run: bash .oh/scripts/docker-compose.sh config --quiet

      - name: Validate Hermes dashboard compose overlay
        env:
          HERMES_DASHBOARD: "true"
        run: bash .oh/scripts/docker-compose.sh config --quiet

      - name: Build sandbox image locally
        env:
          SANDBOX_NAME: openharness-boot-guard-${{ github.run_id }}
        run: |
          docker build \
            --file .devcontainer/Dockerfile \
            --tag "sandbox-${SANDBOX_NAME}" \
            --tag openharness-sandbox-boot-guard:${{ github.sha }} \
            .

      # ── Option C: pre-seed node_modules on the runner, BEFORE boot ──────────
      # The devcontainer bind-mounts the checkout (..:/home/sandbox/harness) and
      # can run a synchronous `pnpm install` during boot when the root dependency
      # tree is missing or its manifest marker is stale — a cold install can
      # overrun the healthcheck's ~390s unhealthy deadline and fail the boot with
      # "missing required tmux session: cron-system". Seeding node_modules here
      # moves that slow/variable install OUT of the healthcheck-timed window; the
      # sandbox smoke step below also sets SKIP_PNPM_INSTALL=1 so the pre-seeded
      # CI path remains an explicit boot-window escape hatch even before a marker
      # exists. The runner workspace is a named volume shared at the same path
      # with the dind daemon, so the node_modules written here is exactly what the
      # container's bind mount sees. The container's UID is synced to the
      # bind-mount owner on boot, so the runner-written node_modules is
      # readable/writable by the sandbox user. See
      # .claude/specs/boot-guard-cold-boot/spec.md (Option C).
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # Match the devcontainer image (Dockerfile installs Node 22.x) so the
          # pre-seeded tree matches what the container runs — spec §9 parity.
          node-version: 22
          cache: pnpm

      - name: Pre-seed node_modules in the checkout (out of the boot window)
        run: pnpm install --frozen-lockfile

      # Prove the pre-seed actually lands where the sandbox will read it. The
      # devcontainer bind mount (..:/home/sandbox/harness) is resolved by the
      # SAME Docker daemon this step talks to, so mounting the workspace into a
      # throwaway container exercises the exact path the sandbox sees. If the
      # runner workspace were NOT shared with the boot daemon, croner would be
      # absent here and we fail fast and loud — instead of silently letting the
      # in-container install run inside the healthcheck window (the flake).
      - name: Verify pre-seeded node_modules is visible to the boot daemon
        run: |
          docker run --rm -v "${{ github.workspace }}:/mnt" busybox \
            sh -c 'ls -la /mnt/node_modules/croner/package.json'
          echo "OK: pre-seeded node_modules is visible to the daemon that boots the sandbox"

      - name: Boot sandbox and verify healthcheck
        env:
          SANDBOX_NAME: openharness-boot-guard-${{ github.run_id }}
          BOOT_SMOKE_TIMEOUT_SECONDS: "900"
          BOOT_SMOKE_INTERVAL_SECONDS: "10"
          # Deps are pre-seeded above and proven visible; SKIP_PNPM_INSTALL=1
          # keeps the in-container install out of the healthcheck-timed window.
          # This is the Option C contract: install slowness can no longer trip
          # the ~390s unhealthy deadline. Boot is now just the cron-system spawn.
          SKIP_PNPM_INSTALL: "1"
        run: bash .oh/scripts/sandbox-boot-smoke.sh

      - name: Boot image-only sandbox and verify seeded Herdr state after restart
        env:
          SANDBOX_NAME: openharness-image-only-guard-${{ github.run_id }}
          OH_SANDBOX_IMAGE: openharness-sandbox-boot-guard:${{ github.sha }}
          OH_PULL_POLICY: never
          BOOT_SMOKE_COMPOSE_FILE: .devcontainer/docker-compose.image-only.yml
          BOOT_SMOKE_TIMEOUT_SECONDS: "900"
          BOOT_SMOKE_INTERVAL_SECONDS: "10"
          BOOT_SMOKE_RESTART_ONCE: "true"
        run: bash .oh/scripts/sandbox-boot-smoke.sh
