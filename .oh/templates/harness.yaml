# harness.yaml — your project's own Open Harness config (local, gitignored).
#
# This is YOUR project's harness config — distinct from the OpenHarness
# template under .oh/templates/. It was materialized into your repo by
# `oh init`. Every key ships commented with its default shown, so a fresh
# `oh init` changes nothing until you uncomment a key.
#
# Format: flat two-level section/key only (no nesting, no anchors).
# Commented keys are inactive (compose / .env defaults apply); uncomment
# to take over a setting. Secrets stay ONLY in gitignored
# .devcontainer/.env — never here.

sandbox:
  # name: my-project           # SANDBOX_NAME — container + compose project name
  # timezone: America/Denver   # TZ — cron schedules, log timestamps

git:
  # user_name: Your Name           # GIT_USER_NAME (spaces OK)
  # user_email: you@example.com    # GIT_USER_EMAIL

install:
  # agent_browser: false       # INSTALL_AGENT_BROWSER — agent-browser + Chromium (~1 GB)
  # hermes: false              # INSTALL_HERMES — Hermes CLI (build arg + runtime)
  # codelayer: false           # INSTALL_CODELAYER — bounded local CodeLayer coding harness (build arg)

hermes:
  # dashboard: false           # HERMES_DASHBOARD — auto-start web dashboard when Hermes is installed
  # dashboard_port: 9119       # HERMES_DASHBOARD_PORT — host loopback port for the dashboard

ssh:
  # Direct SSH into the container. Off by default; uncomment `enabled` to
  # publish sshd via the docker-compose.ssh.yml overlay. Auth is public-key by
  # default — put your key(s) in SANDBOX_SSH_AUTHORIZED_KEYS in .devcontainer/.env
  # (multi-line, so it can't live here). See .oh/docs/integrations/sshd.md.
  # enabled: false             # SANDBOX_SSH — run sshd for direct container SSH
  # port: 2222                 # SANDBOX_SSH_PORT — host loopback port published for SSH
  # password_auth: false       # SANDBOX_SSH_PASSWORD_AUTH — allow password login (uses SANDBOX_PASSWORD)

paths:
  # memory: .oh/memory         # MEMORY_DIR — session logs + MEMORY.md (default .oh/memory).
                               #   Resolved by .oh/scripts/oh-path; change here to relocate
                               #   memory project-wide without editing any skill.
